name: Checkmarx API Integration

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  security-events: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Checkmarx scan
        uses: checkmarx/ast-github-action@main
        with:
          base_uri: "https://deu.iam.checkmarx.net/"
          cx_client_id: ${{ secrets.cxclientid }}
          cx_client_secret: ${{ secrets.cxclientsecret }}
          cx_tenant: accuknox-nfr

      - name: Fetch Checkmarx results and forward to AccuKnox
        run: |
          docker run --rm \
            -e API_KEY=eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJkNTBiZTRkMi1lMzZkLTQwNTYtODA5ZS0yNTg4NmJmODM1ODQifQ..vVHkhwCKy_n-1VQuAIEvtnuFZmnk-YetSxyrLXxo2ijz4HbBPGY1JN_dxceShN-PI0NkfD_Hy4YB8fYuLhQ0fw \
            -e PROJECT_NAME="udit-uniyal/DVWA" \
            -e REPORT_PATH="/app/data/" \
            -v "${{ github.workspace }}:/app/data/" \
            accuknox/checkmarxjob:1.0.4

      - name: Upload SARIF file with code snippets
        uses: actions/upload-artifact@v4
        with:
          name: sarif-results-with-snippets
          path: CHECKMARX-*.json

      - name: Push result to AccuKnox Console
        run: |
          file=$(ls CHECKMARX-*.json | head -n1)
          curl --location "${{ secrets.CSPM_URL }}/api/v1/artifact/?tenant_id=${{ secrets.TENANT_ID }}&data_type=CMX&save_to_s3=true&label_id=${{ secrets.LABEL_ID }}" \
            --header "Tenant-Id: ${{ secrets.TENANT_ID }}" \
            --header "Authorization: Bearer ${{ secrets.CSPM_TOKEN }}" \
            --form "file=@$file"
